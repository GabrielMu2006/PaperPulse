name: PaperPulse
options:
  minimumXcodeGenVersion: 2.42.0
packages:
  PaperCore:
    path: .
targets:
  PaperPulseiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Apps/PaperPulseiOS/Sources
      - path: Apps/PaperPulseiOS/Resources
    info:
      path: Apps/PaperPulseiOS/Resources/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        BGTaskSchedulerPermittedIdentifiers:
          - com.gabrielmu.PaperPulse.refresh
          - com.gabrielmu.PaperPulse.processing
        UIBackgroundModes:
          - fetch
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.gabrielmu.PaperPulse.iOS
      PRODUCT_NAME: PaperPulse
      INFOPLIST_KEY_CFBundleDisplayName: PaperPulse
    dependencies:
      - package: PaperCore
        product: PaperCore
  PaperPulseMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Apps/PaperPulseMac/Sources
      - path: Apps/PaperPulseMac/Resources
    info:
      path: Apps/PaperPulseMac/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.gabrielmu.PaperPulse.macOS
      PRODUCT_NAME: PaperPulse
      MARKETING_VERSION: 0.1.1
      CURRENT_PROJECT_VERSION: 1
      INFOPLIST_KEY_CFBundleDisplayName: PaperPulse
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_ENTITLEMENTS: Apps/PaperPulseMac/Resources/PaperPulseMac.entitlements
    dependencies:
      - package: PaperCore
        product: PaperCore
  PaperPulseMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Apps/PaperPulseMac/Tests
    dependencies:
      - target: PaperPulseMac
    settings:
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PaperPulse.app/Contents/MacOS/PaperPulse"
      BUNDLE_LOADER: "$(TEST_HOST)"
